services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-immobilia}
      POSTGRES_USER: ${POSTGRES_USER:-immobilia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-immobilia_dev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-immobilia} -d ${POSTGRES_DB:-immobilia}"]
      interval: 5s
      timeout: 5s
      retries: 10

  thin-server:
    build:
      context: ./thin-server
    ports:
      - "${THIN_SERVER_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-immobilia}:${POSTGRES_PASSWORD:-immobilia_dev}@postgres:5432/${POSTGRES_DB:-immobilia}
      IMMOBILIA_NLP_PROVIDER: ${IMMOBILIA_NLP_PROVIDER:-none}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      IMMOBILIA_PROXY_SERVER: ${IMMOBILIA_PROXY_SERVER:-}
      IMMOBILIA_PROXY_PROVIDER: ${IMMOBILIA_PROXY_PROVIDER:-static}
      IMMOBILIA_PROXY_HOST: ${IMMOBILIA_PROXY_HOST:-}
      IMMOBILIA_PROXY_PORT: ${IMMOBILIA_PROXY_PORT:-}
      IMMOBILIA_PROXY_PROTOCOL: ${IMMOBILIA_PROXY_PROTOCOL:-http}
      IMMOBILIA_PROXY_USERNAME: ${IMMOBILIA_PROXY_USERNAME:-}
      IMMOBILIA_PROXY_PASSWORD: ${IMMOBILIA_PROXY_PASSWORD:-}
      IMMOBILIA_PROXY_TTL_MINUTES: ${IMMOBILIA_PROXY_TTL_MINUTES:-20}
      WEBSHARE_API_KEY: ${WEBSHARE_API_KEY:-}
      WEBSHARE_PROXY_MODE: ${WEBSHARE_PROXY_MODE:-direct}
      WEBSHARE_PROXY_PROTOCOL: ${WEBSHARE_PROXY_PROTOCOL:-http}
      WEBSHARE_COUNTRY_CODES: ${WEBSHARE_COUNTRY_CODES:-}
      WEBSHARE_PAGE_SIZE: ${WEBSHARE_PAGE_SIZE:-25}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      RESEND_TO_EMAIL: ${RESEND_TO_EMAIL:-}
    depends_on:
      postgres:
        condition: service_healthy

  admin-panel:
    build:
      context: ./admin-panel
    ports:
      - "8080:80"
    environment:
      NODE_ENV: production

  scraper-agent:
    build:
      context: ./scraper-agent
    ports:
      - "8787:8787"
    environment:
      NODE_ENV: production
      PORT: ${PORT:-8787}
      SCRAPER_MODE: ${SCRAPER_MODE:-mock}
      SCRAPER_DISCOVERY_PROVIDER: ${SCRAPER_DISCOVERY_PROVIDER:-puppeteer}
      SCRAPER_SOURCE_URL: ${SCRAPER_SOURCE_URL:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      TAVILY_MAX_RESULTS: ${TAVILY_MAX_RESULTS:-10}
      TAVILY_SEARCH_DEPTH: ${TAVILY_SEARCH_DEPTH:-basic}
      TAVILY_TOPIC: ${TAVILY_TOPIC:-general}
      TAVILY_INCLUDE_DOMAINS: ${TAVILY_INCLUDE_DOMAINS:-}
      TAVILY_EXCLUDE_DOMAINS: ${TAVILY_EXCLUDE_DOMAINS:-}
      TAVILY_EXTRA_QUERIES: ${TAVILY_EXTRA_QUERIES:-}
      TAVILY_PORTAL_SEED_URLS: ${TAVILY_PORTAL_SEED_URLS:-}
      TAVILY_ENABLE_SOCIAL_LEAD_SEARCH: ${TAVILY_ENABLE_SOCIAL_LEAD_SEARCH:-true}
      TAVILY_SOCIAL_MAX_RESULTS: ${TAVILY_SOCIAL_MAX_RESULTS:-12}
      TAVILY_SOCIAL_SEARCH_DEPTH: ${TAVILY_SOCIAL_SEARCH_DEPTH:-basic}
      TAVILY_LEAD_SOURCE_DOMAINS: ${TAVILY_LEAD_SOURCE_DOMAINS:-facebook.com,reddit.com,x.com,twitter.com,threads.net,instagram.com,tiktok.com,linkedin.com}
      TAVILY_SOCIAL_EXTRA_QUERIES: ${TAVILY_SOCIAL_EXTRA_QUERIES:-}
      TAVILY_SOCIAL_CRAWL_URLS: ${TAVILY_SOCIAL_CRAWL_URLS:-}
      TAVILY_ENABLE_PAGE_EXPANSION: ${TAVILY_ENABLE_PAGE_EXPANSION:-true}
      TAVILY_EXPAND_SEED_LIMIT: ${TAVILY_EXPAND_SEED_LIMIT:-8}
      TAVILY_EXTRACT_LIMIT: ${TAVILY_EXTRACT_LIMIT:-30}
      TAVILY_EXTRACT_DEPTH: ${TAVILY_EXTRACT_DEPTH:-basic}
      TAVILY_REQUEST_TIMEOUT_MS: ${TAVILY_REQUEST_TIMEOUT_MS:-90000}
      NLP_REQUEST_TIMEOUT_MS: ${NLP_REQUEST_TIMEOUT_MS:-90000}
      TAVILY_CRAWL_URLS: ${TAVILY_CRAWL_URLS:-}
      TAVILY_CRAWL_LIMIT: ${TAVILY_CRAWL_LIMIT:-5}
      TAVILY_CRAWL_MAX_DEPTH: ${TAVILY_CRAWL_MAX_DEPTH:-1}
      TAVILY_CRAWL_INSTRUCTIONS: ${TAVILY_CRAWL_INSTRUCTIONS:-}
      IMMOBILIA_ADMIN_API_URL: http://thin-server:3000
      IMMOBILIA_USER_ID: ${IMMOBILIA_USER_ID:-local-dev-user}
      IMMOBILIA_LICENSE_TOKEN: ${IMMOBILIA_LICENSE_TOKEN:-}

volumes:
  postgres-data:
